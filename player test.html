<!DOCTYPE html>
<html lang="en">

	<body>
		<main>
			<div class="container">
				<img class="image" src="img/player test.png" alt="" usemap="#Map">
				<audio class="audioClick" src=""></audio>
				<map name="Map">
					<area shape="rect" coords="380,180,440,250" href="#" onclick="event.preventDefault()" class="playOnClick" alt="wasteland/1">
					<area shape="rect" coords="420,450,480,500" href="#popup" class="popup-link" alt="A Real Hero">
				</map>
			</div>

		<footer>
	
</footer>

		<div id="popup" class="popup">
			<div class="player">
	<div class="player_body">
		<audio class="audioPlayer" src=""></audio>
		<div class="frame">
			<picture><source srcset="img/player/frame.webp" type="image/webp"><img src="img/player/frame.png" alt=""></picture>
			<div><img class="tapereel" src="img/player/tape reel.png" alt=""></div>

			<div class="progressBar"><img src="img/player/progress bar.png" alt="">

			</div>
			<div class="controls">
				<img class="play" src="" alt="">
				<picture><source srcset="img/player/backward.webp" type="image/webp"><img class="rewind" src="img/player/backward.png" alt=""></picture>
				<picture><source srcset="img/player/forward.webp" type="image/webp"><img class="forward" src="img/player/forward.png" alt=""></picture>

		</div>
	</div>
</div>
